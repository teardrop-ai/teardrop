name: Dependency Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  dependency-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Generate dependency audit report
        run: |
          python scripts/audit_dependencies.py --ignore-advisory GHSA-537c-gmf6-5ccf --json > dependency-audit-report.json

      - name: Fail on high or critical vulnerabilities
        run: |
          python scripts/audit_dependencies.py --ignore-advisory GHSA-537c-gmf6-5ccf --fail-on-critical --txt

      - name: Upload dependency audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-audit-report
          path: dependency-audit-report.json