# Render Blueprint – https://render.com/docs/blueprint-spec
# Deploy with: Connect repo in Render dashboard → "Blueprint" detected automatically.
#
# Services provisioned:
#   • teardrop      – Starter web service ($7/mo),  Docker runtime
#
# Database: Neon Postgres (free tier or $20/mo)
#   • Create at https://console.neon.tech/ and paste connection string below

services:
  - type: web
    name: teardrop
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      # ── Required ──────────────────────────────────────────────────────────
      - key: APP_ENV
        value: production

      # Neon Postgres connection string (from https://console.neon.tech/).
      # Format: postgresql://user:password@host/dbname
      - key: DATABASE_URL
        sync: false

      # Auto-generated strong secret for client-credentials JWT auth.
      - key: JWT_CLIENT_SECRET
        generateValue: true

      # Prompt operator to paste in their Anthropic API key after first deploy.
      - key: ANTHROPIC_API_KEY
        sync: false

      # ── Recommended ───────────────────────────────────────────────────────
      # Set to your API domain, e.g. https://api.teardrop.dev
      - key: SIWE_DOMAIN
        sync: false

      # Restrict CORS to your frontend origin(s), comma-separated.
      # Defaults to "*" (open) if not set.
      - key: CORS_ORIGINS
        sync: false

      # ── Optional: Web search (Tavily) ─────────────────────────────────────
      - key: TAVILY_API_KEY
        sync: false

      # ── Optional: Web3 RPC endpoints ──────────────────────────────────────
      - key: ETHEREUM_RPC_URL
        sync: false

      - key: BASE_RPC_URL
        sync: false

      # ── Optional: Redis ────────────────────────────────────────────────────
      # Shared Redis for multi-container rate limiting, SIWE nonces, pricing cache.
      # Paste the Internal URL from your Render Redis service.
      - key: REDIS_URL
        sync: false

      # ── Optional: x402 billing ────────────────────────────────────────────
      # Set BILLING_ENABLED=true once wallet + pricing config is ready.
      - key: BILLING_ENABLED
        value: "true"

      - key: X402_PAY_TO_ADDRESS
        sync: false

      - key: X402_NETWORK
        value: "eip155:8453"

      # ── Optional: LangSmith tracing ───────────────────────────────────────
      - key: LANGSMITH_TRACING
        value: "false"

      - key: LANGSMITH_API_KEY
        sync: false

      # ── Optional: Stripe prepaid credit top-up ───────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false

      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # ── MCP Gateway: Auth + Billing + x402 ────────────────────────────────
      # Phase 1: JWT authentication (required to access /tools/mcp)
      - key: MCP_AUTH_ENABLED
        value: "true"

      - key: MCP_AUTH_AUDIENCE
        value: "teardrop-mcp"

      # Phase 2: Credit billing (charge org credits per MCP tool call)
      - key: MCP_BILLING_ENABLED
        value: "true"

      # Phase 3: x402 on-chain payment (allow anonymous callers to pay via USDC)
      - key: MCP_X402_ENABLED
        value: "true"

      # ── Marketplace: Paid MCP tool hosting + author revenue share ────────
      - key: MARKETPLACE_ENABLED
        value: "true"

      - key: MARKETPLACE_DEFAULT_REVENUE_SHARE_BPS
        value: "7000"

      - key: MARKETPLACE_SETTLEMENT_CHAIN_ID
        value: "8453"

      # ── Optional: CoinGecko API key ───────────────────────────────────────────
      - key: COINGECKO_API_KEY
        sync: false
