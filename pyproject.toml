[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    "migrations/*",
    "scripts/*",
    ".venv/*",
    "venv/*",
]

[tool.coverage.report]
fail_under = 60
