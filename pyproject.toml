[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 130

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    "migrations/*",
    "scripts/*",
    ".venv/*",
    "venv/*",
    "app.py",
    "test_x402_payment.py",
    "tools/mcp_server.py",
]

[tool.coverage.report]
fail_under = 80
